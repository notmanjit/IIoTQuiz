<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCQ Quiz · Persistent</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255,255,255,0.92);
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --success: #059669;
      --danger: #dc2626;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.10);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background:
      radial-gradient(circle at top left, rgba(37,99,235,0.12), transparent 28%),
      radial-gradient(circle at top right, rgba(16,185,129,0.10), transparent 26%),
      var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body { min-height: 100vh; }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .app {
      width: 100%;
      max-width: 960px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: var(--shadow);
      border-radius: 28px;
      overflow: hidden;
      backdrop-filter: blur(18px);
    }
    .topbar {
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.65));
    }
    .brand {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      flex-wrap: wrap;
    }
    .title {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      max-width: 60ch;
    }
    .pill-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: white;
      border: 1px solid var(--border);
      font-size: 0.92rem;
      font-weight: 600;
      color: #334155;
      white-space: nowrap;
    }
    .pill.reset-pill {
      background: #fff1f0;
      border-color: #fecaca;
      color: #b91c1c;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .pill.reset-pill:hover {
      background: #fee2e2;
      transform: translateY(-1px);
    }
    .progress-shell {
      margin-top: 18px;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #7c3aed);
      width: 0%;
      transition: width 220ms ease;
      border-radius: inherit;
    }
    .content {
      padding: 22px;
      display: grid;
      gap: 18px;
    }
    .question-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }
    .q-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }
    .q-tag {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--primary);
      font-weight: 700;
      font-size: 0.9rem;
      background: rgba(37,99,235,0.08);
      border-radius: 999px;
      padding: 8px 12px;
    }
    .q-number {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.95rem;
    }
    .question {
      font-size: clamp(1.15rem, 2.3vw, 1.55rem);
      line-height: 1.35;
      margin: 0 0 18px;
      letter-spacing: -0.02em;
    }
    .options {
      display: grid;
      gap: 12px;
    }
    .option {
      width: 100%;
      text-align: left;
      border: 1.5px solid var(--border);
      background: #fff;
      border-radius: 18px;
      padding: 16px 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
      color: var(--text);
      font: inherit;
    }
    .option:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #cbd5e1;
      box-shadow: 0 8px 18px rgba(15,23,42,0.06);
    }
    .option:disabled {
      cursor: default;
      transform: none;
    }
    .option.correct {
      border-color: rgba(5,150,105,0.5);
      background: rgba(5,150,105,0.07);
    }
    .option.wrong {
      border-color: rgba(220,38,38,0.55);
      background: rgba(220,38,38,0.07);
    }
    .badge {
      flex: 0 0 auto;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 0.9rem;
      background: #eff6ff;
      color: var(--primary);
      margin-top: 1px;
    }
    .option.correct .badge {
      background: rgba(5,150,105,0.15);
      color: var(--success);
    }
    .option.wrong .badge {
      background: rgba(220,38,38,0.14);
      color: var(--danger);
    }
    .opt-text {
      line-height: 1.45;
      font-size: 1rem;
      text-align: left;
      flex: 1;
    }
    .feedback {
      margin-top: 18px;
      border-radius: 20px;
      padding: 16px 16px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }
    .feedback.good {
      border-color: rgba(5,150,105,0.35);
      background: rgba(5,150,105,0.06);
    }
    .feedback.bad {
      border-color: rgba(220,38,38,0.35);
      background: rgba(220,38,38,0.05);
    }
    .feedback-title {
      margin: 0 0 6px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .feedback p {
      margin: 0;
      color: #334155;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
    }
    .btn {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 10px 24px rgba(37,99,235,0.16);
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
      color: white;
      min-width: 150px;
    }
    .btn-secondary {
      background: white;
      color: #0f172a;
      border: 1px solid var(--border);
      box-shadow: none;
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .result-shell {
      display: grid;
      gap: 14px;
      place-items: center;
      text-align: center;
      padding: 34px 22px;
    }
    .result-score {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      margin: 0;
    }
    .result-sub {
      margin: 0;
      color: var(--muted);
      max-width: 56ch;
      line-height: 1.6;
    }
    .footer-note {
      padding: 0 22px 22px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }
    @media (max-width: 640px) {
      .wrap { padding: 10px; }
      .content, .topbar { padding: 16px; }
      .question-card { padding: 18px; }
      .btn { width: 100%; }
      .actions { flex-direction: column; align-items: stretch; }
      .pill-row { justify-content: flex-start; }
      .pill { font-size: 0.84rem; }
      .option { padding: 14px; border-radius: 16px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <main class="app" id="app"></main>
</div>

<script>
  // ----------------------------------------------
  //   MCQ DATABASE (unchanged, 180 questions)
  // ----------------------------------------------
  const BANK = [{"question": "Which of the following sensors is an example of a Zero Order System?", "options": [{"label": "a", "text": "Thermometer"}, {"label": "b", "text": "Potentiometer"}, {"label": "c", "text": "Accelerometer"}, {"label": "d", "text": "Gyroscope"}], "answer": "b", "explanation": "A zero-order system produces an output that follows the input in- stantaneously without energy storage or dynamic lag. A potentiometer is a standard example of such a system. Refer to Slide 12 of Week 1 Lecture 1.", "id": "W1Q1", "week": 1, "number": 1}, {"question": "Which Zigbee device type acts as the root and also functions as the network bridge?", "options": [{"label": "a", "text": "Zigbee Router"}, {"label": "b", "text": "Zigbee End Device"}, {"label": "c", "text": "Zigbee Coordinator"}, {"label": "d", "text": "Zigbee Gateway"}], "answer": "c", "explanation": "Every Zigbee network requires at least one coordinator, which ini- tializes the network, acts as the root node, and serves as the network bridge. Refer to Page 133 of the book titled Introduction to Internet of Things by S. Misra, A. Mukherjee, and A. Roy.", "id": "W1Q2", "week": 1, "number": 2}, {"question": "Which physical principle primarily explains the operation of hydraulic actuators?", "options": [{"label": "a", "text": "Pascal’s law"}, {"label": "b", "text": "Bernoulli’s principle"}, {"label": "c", "text": "Ideal gas law"}, {"label": "d", "text": "Faraday’s law"}], "answer": "a", "explanation": "Pascal’s law states that pressure applied to a confined incompress- ible fluid is transmitted undiminished in all directions, enabling force multiplication and precise control in hydraulic systems; hydraulic actuators use incompressible flu- ids (e.g., oil), unlike pneumatic systems that use compressible gases. Refer to Page 196 of the book titled Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W1Q3", "week": 1, "number": 3}, {"question": "At which OSI layer does the 6LoWPAN protocol primarily operate to enable IPv6 packets over IEEE 802.15.4?", "options": [{"label": "a", "text": "Physical Layer"}, {"label": "b", "text": "Network Layer (Adaptation Layer)"}, {"label": "c", "text": "Transport Layer"}, {"label": "d", "text": "Application Layer"}], "answer": "b", "explanation": "6LoWPAN introduces an adaptation layer between the MAC (link) layer and the network layer to support IPv6 header compression and packet frag- mentation over IEEE 802.15.4 networks. Refer to Page 173 of the book titled Introduction to Internet of Things by S. Misra, A. Mukherjee, and A. Roy.", "id": "W1Q4", "week": 1, "number": 4}, {"question": "Which IEEE 802.15.4 variant introduces Direct Sequence Ultra-Wideband (UWB) Physical Layer?", "options": [{"label": "a", "text": "802.15.4a"}, {"label": "b", "text": "802.15.4b"}, {"label": "c", "text": "802.15.4e"}, {"label": "d", "text": "802.15.4g"}], "answer": "a", "explanation": "The IEEE 802.15.4a amendment specifies new physical layers, in- cluding Direct Sequence Ultra-Wideband (UWB), to support precise ranging and low-power communications. Refer to Slide 8 of Week 1 Lecture 2.", "id": "W1Q5", "week": 1, "number": 5}, {"question": "Fill in the blank: In the context of sensor characteristics, the properties of the system’s transient response to an input are collectively termed as characteristics.", "options": [{"label": "a", "text": "Dynamic characteristics"}, {"label": "b", "text": "Static characteristics"}, {"label": "c", "text": "Time-domain characteristics"}, {"label": "d", "text": "Steady-state characteristics"}], "answer": "a", "explanation": "The transient response behavior of a sensing system is described using its dynamic characteristics. Refer to Slide 7 of Week 1 Lecture 1.", "id": "W1Q6", "week": 1, "number": 6}, {"question": "In the context of the WirelessHART standard (IEC 62591) operating in the 2.4 GHz ISM band, what is the frequency gap maintained between two adjacent channels?", "options": [{"label": "a", "text": "2 MHz"}, {"label": "b", "text": "5 MHz"}, {"label": "c", "text": "20 MHz"}, {"label": "d", "text": "25 MHz"}], "answer": "b", "explanation": "WirelessHART follows IEEE 802.15.4 channelization in the 2.4 GHz ISM band, where a 5 MHz spacing between adjacent channels is maintained for reliable industrial communication. Refer to Slide 23 of Week 1 Lecture 2. Refer to Slide 23 of Introduction: IoT Connectivity – Part I, Week 1.", "id": "W1Q7", "week": 1, "number": 7}, {"question": "State True or False. A Passive NFC device can neither transmit nor read any data.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "b", "explanation": "A passive NFC device can transmit data when energized by an active NFC reader but cannot read data from other devices. Refer to Slide 20 of Week 1 Lecture 3.", "id": "W1Q8", "week": 1, "number": 8}, {"question": "What is the data rate of Bluetooth 2.0?", "options": [{"label": "a", "text": "1 Mbps"}, {"label": "b", "text": "2 Mbps"}, {"label": "c", "text": "3 Mbps"}, {"label": "d", "text": "4 Mbps"}], "answer": "c", "explanation": "Bluetooth version 2.0 supports an enhanced data rate of up to 3 Mbps, whereas earlier versions support 1 Mbps. Refer to Slide 13 of Week 1 Lecture 3.", "id": "W1Q9", "week": 1, "number": 9}, {"question": "Fill in the blank: The primary focus of the ISA 100.11a technology is the implementation of in the industrial environment.", "options": [{"label": "a", "text": "Automation"}, {"label": "b", "text": "Connectivity"}, {"label": "c", "text": "Predictive maintenance"}, {"label": "d", "text": "Security"}], "answer": "a", "explanation": "ISA 100.11a is designed to support industrial automation using reliable and secure wireless communication. Refer to Slide 8 of Week 1 Lecture 3.", "id": "W1Q10", "week": 1, "number": 10}, {"question": "State True or False. Classical Internet is not meant for constrained IoT devices.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "Classical Internet protocols are resource-intensive and unsuitable for constrained IoT devices without adaptations. Refer to Slide 2 of Week 1 Lecture 4.", "id": "W1Q11", "week": 1, "number": 11}, {"question": "In the context of CoRE Service Discovery, IoT devices (acting as mini web servers) register their resources to the Resource Directory (RD) using which interface?", "options": [{"label": "a", "text": "Lookup Interface (LI)"}, {"label": "b", "text": "Transport Interface (TI)"}, {"label": "c", "text": "Registration Interface (RI)"}, {"label": "d", "text": "Application Interface (AI)"}], "answer": "c", "explanation": "IoT devices register their available resources with the Resource Directory using the Registration Interface (RI). Refer to Slide 10 of Week 1 Lecture 4.", "id": "W1Q12", "week": 1, "number": 12}, {"question": "In the context of QoS for IoT Networks, which data timeliness policy mandates dropping stale data and notifying the application that a dead- line has been missed?", "options": [{"label": "a", "text": "Latency budget policy"}, {"label": "b", "text": "Deadline policy"}, {"label": "c", "text": "Retention policy"}, {"label": "d", "text": "Priority policy"}], "answer": "b", "explanation": "The Deadline policy enforces time constraints by dropping outdated data and notifying the application of missed deadlines. Refer to Slide 14 of Week 1 Lecture 4.", "id": "W1Q13", "week": 1, "number": 13}, {"question": "State True or False. MQTT works on the Request/Response framework on top of UDP.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "b", "explanation": "MQTT uses a Publish/Subscribe communication model and oper- ates over TCP/IP, not UDP. Refer to Slide 4 of Week 1 Lecture 5.", "id": "W1Q14", "week": 1, "number": 14}, {"question": "Which of the following is/are advantages of XMPP?", "options": [{"label": "a", "text": "Interoperability"}, {"label": "b", "text": "Extensibility"}, {"label": "c", "text": "Flexibility"}, {"label": "d", "text": "All of these"}], "answer": "d", "explanation": "XMPP supports interoperability, extensibility, and flexibility, mak- ing it suitable for diverse IoT communication scenarios. Refer to Slide 15 of Week 1 Lecture 5.", "id": "W1Q15", "week": 1, "number": 15}, {"question": "Which type of waste in the Lean Production System is defined as “Non value-added movement of people”?", "options": [{"label": "a", "text": "Transportation"}, {"label": "b", "text": "Motion"}, {"label": "c", "text": "Waiting"}, {"label": "d", "text": "Defects"}], "answer": "b", "explanation": "Motion refers to the non value-added movement of people, distinct from transportation which involves movement of materials.", "id": "W2Q1", "week": 2, "number": 1}, {"question": "Which type of business model value proposition exists when a bunch of goods/services are of higher value compared to the individual value of that product?", "options": [{"label": "a", "text": "Efficiency-centric"}, {"label": "b", "text": "Novelty-centric"}, {"label": "c", "text": "Lock-in centric"}, {"label": "d", "text": "Complementary"}], "answer": "d", "explanation": "Complementaries exist when a bundle of goods or services provides higher value than the sum of individual offerings. Refer to Page 65 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W2Q2", "week": 2, "number": 2}, {"question": "In the context of Lean Manufacturing wastes, what causes “Processing waste”?", "options": [{"label": "a", "text": "Producing products before demand"}, {"label": "b", "text": "Use of inappropriate tools for processing"}, {"label": "c", "text": "Excess inventory on the factory floor"}, {"label": "d", "text": "Non-value added movement of personnel"}], "answer": "b", "explanation": "Processing waste arises from the use of inappropriate tools or methods that increase production cost without adding value. Refer to Page 173 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W2Q3", "week": 2, "number": 3}, {"question": "Which resource is primarily utilized to achieve “Optimization” in smart and connected products?", "options": [{"label": "a", "text": "Optimization algorithms"}, {"label": "b", "text": "Custom software"}, {"label": "c", "text": "External data sources"}, {"label": "d", "text": "Sensors only"}], "answer": "a", "explanation": "Smart and connected products primarily utilize optimization algo- rithms as the key resource to achieve Optimization. Refer to Slide 9 of Week 2 Lecture 4.", "id": "W2Q4", "week": 2, "number": 4}, {"question": "Which specific “New Material” mentioned in the context of Physical Megatrends is described as being stronger than steel but thinner than a human hair?", "options": [{"label": "a", "text": "Carbon Fiber"}, {"label": "b", "text": "Graphene"}, {"label": "c", "text": "Aerogel"}, {"label": "d", "text": "Titanium Alloy"}], "answer": "b", "explanation": "Graphene is described as stronger than steel while being thinner than the width of a human hair. Refer to Page 56 of the book Introduction to In- dustrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W2Q5", "week": 2, "number": 5}, {"question": "What are the three types of work to be noticed when analyzing “Value streams”?", "options": [{"label": "a", "text": "Design, Production, and Delivery"}, {"label": "b", "text": "Value-added, Incidental, and Pure Waste"}, {"label": "c", "text": "Manual, Automated, and Hybrid"}, {"label": "d", "text": "Planning, Execution, and Monitoring"}], "answer": "b", "explanation": "Value stream analysis identifies value-added, incidental, and pure waste work. Refer to Slide 7 of Week 2 Lecture 3.", "id": "W2Q6", "week": 2, "number": 6}, {"question": "What are the three categories of Megatrends driving the Fourth Indus- trial Revolution?", "options": [{"label": "a", "text": "Economic, Social, Political"}, {"label": "b", "text": "Physical, Digital, Biological"}, {"label": "c", "text": "Hardware, Software, Network"}, {"label": "d", "text": "Local, National, Global"}], "answer": "b", "explanation": "Megatrends are classified into Physical, Digital, and Biological cat- egories. Refer to Slide 14 of Week 2 Lecture 1.", "id": "W2Q7", "week": 2, "number": 7}, {"question": "Which material except Graphene is cited as an example of “New Mate- rials” under Physical Megatrends?", "options": [{"label": "a", "text": "Silicon"}, {"label": "b", "text": "Thermoset plastics"}, {"label": "c", "text": "Copper"}, {"label": "d", "text": "Aluminum"}], "answer": "b", "explanation": "Thermoset plastics along with Graphene is listed as an example of new materials under Physical Megatrends. Refer to Slide 19 of Week 2 Lecture 1.", "id": "W2Q8", "week": 2, "number": 8}, {"question": "How do you define Sustainability in the context of a Manufacturing In- dustry?", "options": [{"label": "a", "text": "To increase profit margins annually"}, {"label": "b", "text": "To continue at a fixed rate"}, {"label": "c", "text": "To eliminate all waste products"}, {"label": "d", "text": "To automate all processes"}], "answer": "b", "explanation": "Sustainability is defined as the ability to continue at a fixed rate. Refer to Slide 2 of Week 2 Lecture 2.", "id": "W2Q9", "week": 2, "number": 9}, {"question": "In the context of “Government Regulations,” what does the acronym EPA stand for?", "options": [{"label": "a", "text": "Economic Policy Agency"}, {"label": "b", "text": "Environmental Protection Agencies"}, {"label": "c", "text": "Energy Production Association"}, {"label": "d", "text": "Employment Protection Act"}], "answer": "b", "explanation": "EPA stands for Environmental Protection Agencies responsible for maintaining environmental rules. Refer to Slide 17 of Week 2 Lecture 2.", "id": "W2Q10", "week": 2, "number": 10}, {"question": "Which of the following is a characteristic of an economic depression?", "options": [{"label": "a", "text": "Duration is less than a year"}, {"label": "b", "text": "High employment rates"}, {"label": "c", "text": "Exponential unemployment increase"}, {"label": "d", "text": "Increase in available credit"}], "answer": "c", "explanation": "Economic depression is characterized by an exponential increase in unemployment. Refer to Slide 25 of Week 2 Lecture 2.", "id": "W2Q11", "week": 2, "number": 11}, {"question": "Which layer in the architecture of smart and connected products is re- sponsible for collecting and acquiring data?", "options": [{"label": "a", "text": "Digital layer"}, {"label": "b", "text": "Connectivity layer"}, {"label": "c", "text": "Physical layer"}, {"label": "d", "text": "Application layer"}], "answer": "c", "explanation": "The Physical layer is responsible for collecting and acquiring data from objects or the environment. Refer to Slide 20 of Week 2 Lecture 4.", "id": "W2Q12", "week": 2, "number": 12}, {"question": "Which of the following is a “Lock-in centric” value creation model?", "options": [{"label": "a", "text": "Focusing on novelty"}, {"label": "b", "text": "Improving transaction efficiency"}, {"label": "c", "text": "Preventing customer migration"}, {"label": "d", "text": "Offering complementary products"}], "answer": "c", "explanation": "Lock-in centric models focus on preventing customer migration. Refer to Slide 16 of Week 2 Lecture 4.", "id": "W2Q13", "week": 2, "number": 13}, {"question": "Which characteristic of smart factories involves “Self-configuration”?", "options": [{"label": "a", "text": "Proactivity"}, {"label": "b", "text": "Transparency"}, {"label": "c", "text": "Agility"}, {"label": "d", "text": "Connection"}], "answer": "c", "explanation": "Self-configuration is listed as a key aspect of Agility in smart facto- ries. Refer to Slide 16 of Week 2 Lecture 5.", "id": "W2Q14", "week": 2, "number": 14}, {"question": "In the automation pyramid of a smart factory, which level is at the very top?", "options": [{"label": "a", "text": "Device level"}, {"label": "b", "text": "Control level"}, {"label": "c", "text": "Manufacturing execution system level"}, {"label": "d", "text": "ERP level"}], "answer": "d", "explanation": "The automation pyramid places the ERP level at the top. Refer to Slide 21 of Week 2 Lecture 5.", "id": "W2Q15", "week": 2, "number": 15}, {"question": "Who developed the first functioning Augmented Reality (AR) system in 1992?", "options": [{"label": "a", "text": "Ivan Sutherland"}, {"label": "b", "text": "Louis Rosenberg"}, {"label": "c", "text": "Thamos Caudell"}, {"label": "d", "text": "Morton Heilig"}], "answer": "b", "explanation": "The timeline shows that Louis Rosenberg developed the first func- tioning AR system in 1992. Refer to Slide 6 of Week 3 Lecture 3.", "id": "W3Q1", "week": 3, "number": 1}, {"question": "In the 5C Architecture of CPS, which level provides the “Collaborative Diagnostics” functionality?", "options": [{"label": "a", "text": "Cyber Level"}, {"label": "b", "text": "Cognition Level"}, {"label": "c", "text": "Configuration Level"}, {"label": "d", "text": "Conversion Level"}], "answer": "b", "explanation": "The Cognition level supports collaborative diagnostics and decision making. Refer to Slide 16 of Week 3 Lecture 1.", "id": "W3Q2", "week": 3, "number": 2}, {"question": "State True or False: AR technologies are widely used in the field of med- ical science to perform complex surgeries in the domain of Neurosurgery, MRI, and X-Ray systems.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "AR technologies are widely applied in medical science for complex surgical procedures. Refer to Page 154 of the book Introduction to Industrial In- ternet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W3Q3", "week": 3, "number": 3}, {"question": "Which “V” of Big Data refers to the fact that Big Data supports di- verse categories and formats of data with no restrictions over input data formats?", "options": [{"label": "a", "text": "Volume"}, {"label": "b", "text": "Velocity"}, {"label": "c", "text": "Variety"}, {"label": "d", "text": "Value"}], "answer": "c", "explanation": "Variety represents the heterogeneous nature and diversity of Big Data formats. Refer to Slide 9 of Week 3 Lecture 5.", "id": "W3Q4", "week": 3, "number": 4}, {"question": "In the context of Data Acquisition in Industry 4.0, what are the three main steps followed during the “Data pre-processing” of relational data?", "options": [{"label": "a", "text": "Collection, Transmission, Storage"}, {"label": "b", "text": "Integration, Clearing, Redundancy Mitigation"}, {"label": "c", "text": "Analysis, Visualization, Decision Making"}, {"label": "d", "text": "Encryption, Compression, Archiving"}], "answer": "b", "explanation": "Relational data pre-processing involves integration, clearing, and redundancy mitigation. Refer to Slide 16 of Week 3 Lecture 5.", "id": "W3Q5", "week": 3, "number": 5}, {"question": "What is the first step involved in the working of a Virtual Reality (VR) system?", "options": [{"label": "a", "text": "Display screen shows the user view through lenses"}, {"label": "b", "text": "Processing unit creates sensations for the user"}, {"label": "c", "text": "Lenses focus and reshape the image for each eye"}, {"label": "d", "text": "Sensors estimate the user’s motion and direction in space"}], "answer": "d", "explanation": "The VR workflow begins with sensors estimating the user’s motion and direction. Refer to Slide 23 of Week 3 Lecture 3.", "id": "W3Q6", "week": 3, "number": 6}, {"question": "State True or False: Brain-machine interfaces are engineered systems based on cognition and neuroscience and are a part of CPS.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "Brain-machine interfaces are engineered systems based on cognition and neuroscience within CPS applications. Refer to Slide 8 of Week 3 Lecture 1.", "id": "W3Q7", "week": 3, "number": 7}, {"question": "What are PMUs in the context of CPS for Smart Grid?", "options": [{"label": "a", "text": "Power Management Unit"}, {"label": "b", "text": "Phasor Measurement Unit"}, {"label": "c", "text": "Performance Monitoring Unit"}, {"label": "d", "text": "Project Management Unit"}], "answer": "b", "explanation": "PMUs measure synchronized voltage and current phasors in power grids. Refer to Slide 10 of Week 3 Lecture 1.", "id": "W3Q8", "week": 3, "number": 8}, {"question": "Which of the following options best describes a Collaboration Platform?", "options": [{"label": "a", "text": "Manufacturing hardware device"}, {"label": "b", "text": "Business networking software"}, {"label": "c", "text": "Entertainment social app"}, {"label": "d", "text": "Financial record database"}], "answer": "b", "explanation": "Collaboration platforms combine organizational networking capa- bilities for operations. Refer to Slide 2 of Week 3 Lecture 2.", "id": "W3Q9", "week": 3, "number": 9}, {"question": "What are the five phases of the Product Lifecycle?", "options": [{"label": "a", "text": "Plan, Do, Check, Act"}, {"label": "b", "text": "Design, Build, Test, Deploy"}, {"label": "c", "text": "Ideate, Create, Market, Sell"}, {"label": "d", "text": "Visualize, Explain, Perceive, Retire"}], "answer": "d", "explanation": "The product lifecycle consists of Visualize, Explain, Perceive, Use/Support, and Dispose/Retire phases. Refer to Slide 12 of Week 3 Lecture 2.", "id": "W3Q10", "week": 3, "number": 10}, {"question": "Which of the following is a Technique/Method proposed to refine pro- duction across the lifecycle?", "options": [{"label": "a", "text": "ABC (Activity Based Costing)"}, {"label": "b", "text": "XYZ Analysis"}, {"label": "c", "text": "PQR Theory"}, {"label": "d", "text": "LMN Modeling"}], "answer": "a", "explanation": "ABC is listed as a method to refine production across the lifecycle. Refer to Slide 21 of Week 3 Lecture 2.", "id": "W3Q11", "week": 3, "number": 11}, {"question": "Which of the following best describes Artificial Intelligence (AI)?", "options": [{"label": "a", "text": "Hardware manufacturing process"}, {"label": "b", "text": "Manmade thinking power"}, {"label": "c", "text": "Database management system"}, {"label": "d", "text": "Manual data entry"}], "answer": "b", "explanation": "AI is defined as manmade thinking power enabling intuitive decision- making. Refer to Slide 3 of Week 3 Lecture 4.", "id": "W3Q12", "week": 3, "number": 12}, {"question": "Fill in the blank. Declarative knowledge is also known as .", "options": [{"label": "a", "text": "Operational knowledge"}, {"label": "b", "text": "Heuristic knowledge"}, {"label": "c", "text": "Relational knowledge"}, {"label": "d", "text": "Procedural knowledge"}], "answer": "c", "explanation": "Declarative knowledge is classified as relational knowledge. Refer to Slide 6 of Week 3 Lecture 4.", "id": "W3Q13", "week": 3, "number": 13}, {"question": "Which of the following is an usecase of AI in Industry 4.0?", "options": [{"label": "a", "text": "Increasing manual labor"}, {"label": "b", "text": "Reducing internet usage"}, {"label": "c", "text": "Slowing production cycles"}, {"label": "d", "text": "Ensuring machine safety"}], "answer": "d", "explanation": "AI in Industry 4.0 is used to ensure machine safety and efficiency. Refer to Slide 11 of Week 3 Lecture 4.", "id": "W3Q14", "week": 3, "number": 14}, {"question": "Which of the following statement best describes the characteristics of Unstructured data?", "options": [{"label": "a", "text": "Possesses pre-defined model"}, {"label": "b", "text": "Stored in relational databases"}, {"label": "c", "text": "Managed by SQL"}, {"label": "d", "text": "No pre-defined model"}], "answer": "d", "explanation": "Unstructured data does not possess any predefined model. Refer to Slide 5 of Week 3 Lecture 5.", "id": "W3Q15", "week": 3, "number": 15}, {"question": "Which component of Cybersecurity protects applications from outer threats, often using firewalls?", "options": [{"label": "a", "text": "Application Security"}, {"label": "b", "text": "Network Security"}, {"label": "c", "text": "Cloud Security"}, {"label": "d", "text": "End-user Education"}], "answer": "a", "explanation": "Application security protects applications using software and hard- ware countermeasures such as firewalls. Refer to Page 66 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.-", "id": "W4Q1", "week": 4, "number": 1}, {"question": "What is Zephyr?", "options": [{"label": "a", "text": "A Smart Sensor"}, {"label": "b", "text": "An Website"}, {"label": "c", "text": "An OS"}, {"label": "d", "text": "None of these"}], "answer": "c", "explanation": "Zephyr is listed as a supporting operating system in the context of smart sensors. Refer to Slide 13 of Week 4 Lecture 4.", "id": "W4Q2", "week": 4, "number": 2}, {"question": "Fill in the blank: Most of the commonly used ransomware attacks use , where the user receives a legal file as an attachment and is skillfully forced to download or open it.", "options": [{"label": "a", "text": "Worm"}, {"label": "b", "text": "Virus"}, {"label": "c", "text": "Trojan"}, {"label": "d", "text": "Malware"}], "answer": "c", "explanation": "Ransomware attacks commonly use Trojans delivered as legitimate- looking attachments. Refer to Page 68 of the book Introduction to Industrial In- ternet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W4Q3", "week": 4, "number": 3}, {"question": "In the Software-Defined Cloud Manufacturing Architecture (SDCMA), which component is responsible for “detecting abnormality”?", "options": [{"label": "a", "text": "Control Elements (CE)"}, {"label": "b", "text": "Hardware Plane"}, {"label": "c", "text": "Ensemble Intelligence Framework (EIF)"}, {"label": "d", "text": "Software Plane"}], "answer": "c", "explanation": "The Ensemble Intelligence Framework is responsible for detecting abnormalities in SDCMA. Refer to Slide 21 of Week 4 Lecture 1.", "id": "W4Q4", "week": 4, "number": 4}, {"question": "Fill in the blank: Typically, form the core of the smart sensor nodes.", "options": [{"label": "a", "text": "Transistors"}, {"label": "b", "text": "Microprocessors"}, {"label": "c", "text": "MOSFETS"}, {"label": "d", "text": "Diodes"}], "answer": "b", "explanation": "Microprocessors typically form the core of smart sensor nodes. Refer to Page 86 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W4Q5", "week": 4, "number": 5}, {"question": "Which cybersecurity component involves “strategies to maintain the availability, integrity, and confidentiality of business data”?", "options": [{"label": "a", "text": "Network Security"}, {"label": "b", "text": "Operational Security"}, {"label": "c", "text": "Information Security"}, {"label": "d", "text": "Physical Security"}], "answer": "c", "explanation": "Information security focuses on protecting data using the CIA triad. Refer to Page 66 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W4Q6", "week": 4, "number": 6}, {"question": "Which of the following is NOT a protected asset in cybersecurity?", "options": [{"label": "a", "text": "Hardware"}, {"label": "b", "text": "Software"}, {"label": "c", "text": "Data"}, {"label": "d", "text": "Public domain information"}], "answer": "d", "explanation": "Public domain information is not considered a protected cyberse- curity asset. Refer to Slide 3 of Week 4 Lecture 1.", "id": "W4Q7", "week": 4, "number": 7}, {"question": "How does IIoT modify traditional automation techniques?", "options": [{"label": "a", "text": "By removing all sensors"}, {"label": "b", "text": "By exploiting IT technology"}, {"label": "c", "text": "By using manual tools"}, {"label": "d", "text": "By ignoring data"}], "answer": "b", "explanation": "IIoT modifies traditional automation by exploiting information technology. Refer to Slide 7 of Week 4 Lecture 2.", "id": "W4Q8", "week": 4, "number": 8}, {"question": "Which of the following has been identified as a major challenge in IIoT deployment?", "options": [{"label": "a", "text": "Excessive standardization"}, {"label": "b", "text": "Lack of generated data"}, {"label": "c", "text": "Surplus of skilled workers"}, {"label": "d", "text": "Data integration challenges"}], "answer": "d", "explanation": "Data integration is listed as a major challenge in IIoT deployment. Refer to Slide 8 of Week 4 Lecture 2.", "id": "W4Q9", "week": 4, "number": 9}, {"question": "How does Industrial Internet assist Power Production?", "options": [{"label": "a", "text": "Increases inspection costs"}, {"label": "b", "text": "Locates broken equipment easily"}, {"label": "c", "text": "Disconnects the grid"}, {"label": "d", "text": "Hides performance data"}], "answer": "b", "explanation": "The Industrial Internet helps locate broken power equipment easily. Refer to Slide 20 of Week 4 Lecture 3.", "id": "W4Q10", "week": 4, "number": 10}, {"question": "State True or False: The Industrial Internet can benefit commercial aviation industries by improving both airline operations and asset man- agement.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "The Industrial Internet improves airline operations and asset man- agement. Refer to Slide 17 of Week 4 Lecture 3.", "id": "W4Q11", "week": 4, "number": 11}, {"question": "What is considered the primary source of IIoT data?", "options": [{"label": "a", "text": "Cloud Server"}, {"label": "b", "text": "Actuator"}, {"label": "c", "text": "Sensor"}, {"label": "d", "text": "Microprocessor"}], "answer": "c", "explanation": "Sensors are identified as the primary source of IIoT data. Refer to Slide 2 of Week 4 Lecture 4.", "id": "W4Q12", "week": 4, "number": 12}, {"question": "Fill in the blank. Conventional Sensing is primarily involved in .", "options": [{"label": "a", "text": "Feedback automation"}, {"label": "b", "text": "Cloud computing"}, {"label": "c", "text": "Internet connectivity"}, {"label": "d", "text": "Big data analytics"}], "answer": "a", "explanation": "Conventional sensing is involved in feedback automation of indus- trial control systems. Refer to Slide 5 of Week 4 Lecture 4.", "id": "W4Q13", "week": 4, "number": 13}, {"question": "Which challenge of Industry 4.0 is directly associated with ageing society and lack of skilled workers?", "options": [{"label": "a", "text": "Dynamic market conditions"}, {"label": "b", "text": "Resource utilization"}, {"label": "c", "text": "Constrained workforce"}, {"label": "d", "text": "Product management"}], "answer": "c", "explanation": "Ageing society and lack of skilled workers are categorized under constrained workforce. Refer to Slide 5 of Week 4 Lecture 5.", "id": "W4Q14", "week": 4, "number": 14}, {"question": "Efficient use of materials, water, and energy is categorized under which expected feature of Industry 4.0?", "options": [{"label": "a", "text": "Competitiveness"}, {"label": "b", "text": "Innovation"}, {"label": "c", "text": "Workforce"}, {"label": "d", "text": "Efficiency"}], "answer": "d", "explanation": "Efficient resource usage is associated with the efficiency feature of Industry 4.0. Refer to Slide 7 of Week 4 Lecture 5.", "id": "W4Q15", "week": 4, "number": 15}, {"question": "In the context of the “Value Proposition” building block, which of the following is considered a qualitative value?", "options": [{"label": "a", "text": "Price"}, {"label": "b", "text": "Post-purchase cost reduction"}, {"label": "c", "text": "Customer experience"}, {"label": "d", "text": "Product performance"}], "answer": "c", "explanation": "Customer experience is categorized as a qualitative value in the value proposition. Refer to Slide 4 of Week 5 Lecture 2.", "id": "W5Q1", "week": 5, "number": 1}, {"question": "A business model that serves specific and specialized customer groups is known as a:", "options": [{"label": "a", "text": "Mass market"}, {"label": "b", "text": "Segmented market"}, {"label": "c", "text": "Niche market"}, {"label": "d", "text": "Diversified market"}], "answer": "c", "explanation": "Niche market business models focus on specific and specialized cus- tomer groups. Refer to Page 102 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W5Q2", "week": 5, "number": 2}, {"question": "Credits and cash owned by an organization are classified under which asset category?", "options": [{"label": "a", "text": "Physical assets"}, {"label": "b", "text": "Human assets"}, {"label": "c", "text": "Intellectual assets"}, {"label": "d", "text": "Financial assets"}], "answer": "d", "explanation": "Financial assets include credits and cash owned by an organization. Refer to Page 103 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W5Q3", "week": 5, "number": 3}, {"question": "Which component of the IIoT business model focuses on solving the complexities and uncertainties inherent in interactions between various business actors?", "options": [{"label": "a", "text": "Value Proposition"}, {"label": "b", "text": "Value Network"}, {"label": "c", "text": "Value Capturing"}, {"label": "d", "text": "Value Communication"}], "answer": "d", "explanation": "Value Communication addresses interaction complexities and un- certainties among IIoT stakeholders. Refer to Page 109 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W5Q4", "week": 5, "number": 4}, {"question": "The “Information Domain” in IIRA handles data persistence. In the context of Big Data generated by IIoT, which “V” refers to the trust- worthiness or quality of the data?", "options": [{"label": "a", "text": "Volume"}, {"label": "b", "text": "Velocity"}, {"label": "c", "text": "Variety"}, {"label": "d", "text": "Veracity"}], "answer": "d", "explanation": "Veracity refers to the trustworthiness and quality of data. Refer to Page 21 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W5Q5", "week": 5, "number": 5}, {"question": "Which of the following is considered a “Lagging KPI” for occupational safety?", "options": [{"label": "a", "text": "Percentage of workers with adequate safety training"}, {"label": "b", "text": "Number of OSH audits performed"}, {"label": "c", "text": "Frequency of observed unsafe behavior"}, {"label": "d", "text": "Number of production days lost due to sickness absence"}], "answer": "d", "explanation": "Production days lost due to sickness absence is an outcome-based lagging indicator. Refer to Page 124 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W5Q6", "week": 5, "number": 6}, {"question": "Caterpillar uses IoT combined with which technology for machine mon- itoring?", "options": [{"label": "a", "text": "Virtual Reality (VR)"}, {"label": "b", "text": "Augmented Reality (AR)"}, {"label": "c", "text": "Blockchain technology"}, {"label": "d", "text": "Quantum computing"}], "answer": "b", "explanation": "Caterpillar uses IoT combined with augmented reality for real-time machine monitoring. Refer to Slide 4 of Week 5 Lecture 1.", "id": "W5Q7", "week": 5, "number": 7}, {"question": "Fill in the blank. Maersk uses IoT primarily for .", "options": [{"label": "a", "text": "Smart Logistics"}, {"label": "b", "text": "Manufacturing cars"}, {"label": "c", "text": "Generating electricity"}, {"label": "d", "text": "Mining coal"}], "answer": "a", "explanation": "Maersk applies IoT mainly for smart logistics operations. Refer to Slide 17 of Week 5 Lecture 1.", "id": "W5Q8", "week": 5, "number": 8}, {"question": "What does a Business Model primarily describe?", "options": [{"label": "a", "text": "Technical hardware specifications"}, {"label": "b", "text": "Rationale of creating value"}, {"label": "c", "text": "Employee holiday schedules"}, {"label": "d", "text": "Office floor plan"}], "answer": "b", "explanation": "A business model explains how an organization creates, delivers, and captures value. Refer to Slide 2 of Week 5 Lecture 2.", "id": "W5Q9", "week": 5, "number": 9}, {"question": "State True or False: Lack of interoperability leads to increased complex- ity.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "Lack of interoperability increases system complexity and cost. Refer to Slide 26 of Week 5 Lecture 3.", "id": "W5Q10", "week": 5, "number": 10}, {"question": "Fill in the blank. The three categories of IIoT business models are Cloud- based, Process-Oriented, and Business Model.", "options": [{"label": "a", "text": "Hardware-Oriented"}, {"label": "b", "text": "Service-Oriented"}, {"label": "c", "text": "Product-Oriented"}, {"label": "d", "text": "Data-Oriented"}], "answer": "b", "explanation": "IIoT business models are classified as Cloud-based, Service-Oriented, and Process-Oriented. Refer to Slide 4 of Week 5 Lecture 3.", "id": "W5Q11", "week": 5, "number": 11}, {"question": "In the IIRA Framework, what are defined as “collection of ideas which describe, analyze, and solve the set of specific concerns”?", "options": [{"label": "a", "text": "Stakeholders"}, {"label": "b", "text": "Architecture Frames"}, {"label": "c", "text": "Viewpoints"}, {"label": "d", "text": "Testbeds"}], "answer": "c", "explanation": "Viewpoints are collections of ideas addressing specific architectural concerns. Refer to Slide 9 of Week 5 Lecture 4.", "id": "W5Q12", "week": 5, "number": 12}, {"question": "Which architecture pattern allows for fast device-to-device integration with minimum response time?", "options": [{"label": "a", "text": "Three-tier architecture"}, {"label": "b", "text": "Client-Server architecture"}, {"label": "c", "text": "Layered Databus pattern"}, {"label": "d", "text": "Gateway-mediated architecture"}], "answer": "c", "explanation": "Layered Databus architecture enables fast device-to-device integra- tion. Refer to Slide 23 of Week 5 Lecture 4.", "id": "W5Q13", "week": 5, "number": 13}, {"question": "Which element in the Usage Viewpoint of IIRA is defined as the “basic unit of work” carried out by a party assuming a role?", "options": [{"label": "a", "text": "Task"}, {"label": "b", "text": "Activity"}, {"label": "c", "text": "Agent"}, {"label": "d", "text": "Workflow"}], "answer": "a", "explanation": "Task is defined as the basic unit of work in the Usage Viewpoint. Refer to Slide 10 of Week 5 Lecture 5.", "id": "W5Q14", "week": 5, "number": 14}, {"question": "Which IIRA viewpoint relates to the technical representation of an IIoT system including interfaces, protocols, and behaviors?", "options": [{"label": "a", "text": "Functional Viewpoint"}, {"label": "b", "text": "Implementation Viewpoint"}, {"label": "c", "text": "Usage Viewpoint"}, {"label": "d", "text": "Business Viewpoint"}], "answer": "b", "explanation": "The implementation viewpoint focuses on technical representation including interfaces and protocols. Refer to Slide 23", "id": "W5Q15", "week": 5, "number": 15}, {"question": "What is the usual packet size requirement for uRLLC?", "options": [{"label": "a", "text": "8 B"}, {"label": "b", "text": "16–32 B"}, {"label": "c", "text": "32–200 B"}, {"label": "d", "text": "1024 B"}], "answer": "c", "explanation": "uRLLC requires packet sizes in the range of 32 to 200 bytes to satisfy ultra-low latency and high reliability constraints. Refer to Slide 21 of Week 6 Lecture 5.", "id": "W6Q1", "week": 6, "number": 1}, {"question": "Fill in the blank: ModBus-TCP is an industrial communication protocol that is primarily designed to run over .", "options": [{"label": "a", "text": "Serial RS-232 links"}, {"label": "b", "text": "Standard Ethernet and TCP/IP"}, {"label": "c", "text": "Bluetooth Low Energy"}, {"label": "d", "text": "Satellite communication"}], "answer": "b", "explanation": "ModBus-TCP is an implementation of the Modbus protocol over the Ethernet and TCP/IP stack for industrial automation. Refer to Pages 214–215 of Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W6Q2", "week": 6, "number": 2}, {"question": "Which Profibus variant is designed for high-speed communication be- tween automation systems and equipment using RS-485 or fiber optics?", "options": [{"label": "a", "text": "Profibus PA"}, {"label": "b", "text": "Profibus FMS"}, {"label": "c", "text": "Profibus DP"}, {"label": "d", "text": "Profinet"}], "answer": "c", "explanation": "Profibus DP is designed for high-speed data exchange between au- tomation systems and field devices using RS-485 or fiber optic communication. Refer to Page 206 of Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W6Q3", "week": 6, "number": 3}, {"question": "What is the maximum transmission rate of the “Standard CC-Link” technology?", "options": [{"label": "a", "text": "156 kbps"}, {"label": "b", "text": "500 kbps"}, {"label": "c", "text": "10 Mbps"}, {"label": "d", "text": "1 Gbps"}], "answer": "c", "explanation": "The basic CC-Link technology supports a maximum transmission rate of 10 Mbps. Refer to Page 213 of Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W6Q4", "week": 6, "number": 4}, {"question": "Which gas sensing method relies specifically on “Electrical Variation” for detection?", "options": [{"label": "a", "text": "Acoustic Methods"}, {"label": "b", "text": "Optic Methods"}, {"label": "c", "text": "Metal Oxide Semiconductors (MOS)"}, {"label": "d", "text": "Calorimetric Method"}], "answer": "c", "explanation": "Metal Oxide Semiconductor based sensors detect gases through changes in their electrical properties. Refer to Slide 3 of Week 6 Lecture 2.", "id": "W6Q5", "week": 6, "number": 5}, {"question": "In manufacturing processes, Fieldbus is primarily used for which type of data transfer?", "options": [{"label": "a", "text": "Clock synchronization"}, {"label": "b", "text": "High-performance analytics"}, {"label": "c", "text": "Periodic I/O data transfer"}, {"label": "d", "text": "Wide Area Network (WAN) management"}], "answer": "c", "explanation": "Fieldbus systems are designed for periodic input and output data transfer between field devices and controllers. Refer to Slide 2 of Week 6 Lecture 3.", "id": "W6Q6", "week": 6, "number": 6}, {"question": "Under which category of sensors do “smoke detectors” and “alcohol de- tectors” fall in an industrial monitoring context?", "options": [{"label": "a", "text": "Optical sensors"}, {"label": "b", "text": "Thermal sensors"}, {"label": "c", "text": "Chemical sensors"}, {"label": "d", "text": "Electrical sensors"}], "answer": "c", "explanation": "Smoke detectors and alcohol detectors are categorized as chemical sensors as they detect specific substances through chemical interactions. Refer to Page 189 of Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W6Q7", "week": 6, "number": 7}, {"question": "Which variant of the CC-Link protocol is specifically designed to ensure error-free data communication of large data through Industrial Ether- net?", "options": [{"label": "a", "text": "CC-Link Safety"}, {"label": "b", "text": "CC-Link LT"}, {"label": "c", "text": "CC-Link IE"}, {"label": "d", "text": "CC-Link RTU"}], "answer": "c", "explanation": "CC-Link IE leverages Industrial Ethernet to ensure reliable and error-free transmission of large volumes of industrial data. Refer to Page 212 of Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W6Q8", "week": 6, "number": 8}, {"question": "Improvement of which of the following is emphasized as a key concern in IIoT systems?", "options": [{"label": "a", "text": "Only profitability"}, {"label": "b", "text": "Only system throughput"}, {"label": "c", "text": "Efficiency, productivity, health, and safety"}, {"label": "d", "text": "Hardware miniaturization alone"}], "answer": "c", "explanation": "IIoT systems emphasize improving efficiency, productivity, health, and safety. Refer to Slide 2 of Week 6 Lecture Material 1.", "id": "W6Q9", "week": 6, "number": 9}, {"question": "State True or False. The output voltage of the LM35 sensor is linearly proportional to Kelvin temperature.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "b", "explanation": "The LM35 output voltage is linearly proportional to Celsius tem- perature, not Kelvin. Refer to Slide 15 of Week 6 Lecture Material 1.", "id": "W6Q10", "week": 6, "number": 10}, {"question": "Fill in the blank: Air quality monitoring and alert systems with gas sensing units are primarily deployed to .", "options": [{"label": "a", "text": "Improve network bandwidth"}, {"label": "b", "text": "Avoid risks of harmful gas exposure"}, {"label": "c", "text": "Reduce hardware cost"}, {"label": "d", "text": "Increase cloud storage"}], "answer": "b", "explanation": "These systems are deployed to avoid risks of harmful gas exposure. Refer to Slide 2 of Week 6 Lecture Material 2.", "id": "W6Q11", "week": 6, "number": 11}, {"question": "Which of the following belongs to the Fieldbus category?", "options": [{"label": "a", "text": "Profinet"}, {"label": "b", "text": "EtherNet/IP"}, {"label": "c", "text": "TSN"}, {"label": "d", "text": "Modbus-RTU"}], "answer": "d", "explanation": "Modbus-RTU is explicitly classified under Fieldbus technologies. Refer to Slide 3 of Week 6 Lecture Material 3.", "id": "W6Q12", "week": 6, "number": 12}, {"question": "Which Profibus variant handles communication between PCs and Pro- grammable Logic Controllers?", "options": [{"label": "a", "text": "Profibus DP"}, {"label": "b", "text": "Profibus PA"}, {"label": "c", "text": "Profibus FMS"}, {"label": "d", "text": "Profibus IE"}], "answer": "c", "explanation": "Profibus FMS is designed for communication between PCs and PLCs. Refer to Slide 4 of Week 6 Lecture Material 4.", "id": "W6Q13", "week": 6, "number": 13}, {"question": "Which network topology is used by Interbus?", "options": [{"label": "a", "text": "Bus"}, {"label": "b", "text": "Star"}, {"label": "c", "text": "Active ring"}, {"label": "d", "text": "Hybrid"}], "answer": "c", "explanation": "Interbus uses an active ring topology. Refer to Slide 8 of Week 6 Lecture Material 4.", "id": "W6Q14", "week": 6, "number": 14}, {"question": "Which frequency band is classified as high band in 5G NR?", "options": [{"label": "a", "text": "< 1 GHz"}, {"label": "b", "text": "1–6 GHz"}, {"label": "c", "text": "> 24 GHz"}, {"label": "d", "text": "6–24 GHz"}], "answer": "c", "explanation": "High-band 5G NR operates above 24 GHz in the millimeter-wave spectrum. Refer to Slide 7 of Week 6 Lecture Material 5.", "id": "W6Q15", "week": 6, "number": 15}, {"question": "What does LPWAN stand for?", "options": [{"label": "a", "text": "Low Power Wireless Access Network"}, {"label": "b", "text": "Long Power Wide Area Network"}, {"label": "c", "text": "Low Power Wide Area Network"}, {"label": "d", "text": "Long Power Wireless Area Network"}], "answer": "c", "explanation": "LPWAN expands to Low Power Wide Area Network. Refer to Slide 3 of Week 7 Lecture Material–1.", "id": "W7Q1", "week": 7, "number": 1}, {"question": "LoRa technology operates in which of the following frequency bands?", "options": [{"label": "a", "text": "License-free sub-gigahertz bands"}, {"label": "b", "text": "Licensed microwave bands"}, {"label": "c", "text": "Optical frequency bands"}, {"label": "d", "text": "Millimeter-wave bands"}], "answer": "a", "explanation": "LoRa operates in license-free sub-gigahertz radio frequency bands. Refer to Slide 4 of Week 7 Lecture Material–1.", "id": "W7Q2", "week": 7, "number": 2}, {"question": "What is the maximum wireless throughput achieved by SIGFOX?", "options": [{"label": "a", "text": "1 kbps"}, {"label": "b", "text": "500 bps"}, {"label": "c", "text": "10 kbps"}, {"label": "d", "text": "100 bps"}], "answer": "d", "explanation": "SIGFOX supports a maximum wireless throughput of up to 100 bits per second. Refer to Slide 5 of Week 7 Lecture Material–1.", "id": "W7Q3", "week": 7, "number": 3}, {"question": "Which IEEE standard forms the basis of the physical and MAC layers of Zigbee?", "options": [{"label": "a", "text": "IEEE 802.11"}, {"label": "b", "text": "IEEE 802.3"}, {"label": "c", "text": "IEEE 802.15.4"}, {"label": "d", "text": "IEEE 802.16"}], "answer": "c", "explanation": "Zigbee physical and MAC layers are based on IEEE 802.15.4. Refer to Slide 5 of Week 7 Lecture Material–2.", "id": "W7Q4", "week": 7, "number": 4}, {"question": "Which of the following is NOT a Zigbee-supported network topology?", "options": [{"label": "a", "text": "Star"}, {"label": "b", "text": "Tree"}, {"label": "c", "text": "Mesh"}, {"label": "d", "text": "Ring"}], "answer": "d", "explanation": "Zigbee supports Star, Tree, and Mesh topologies, but not Ring topology. Refer to Slide 5 of Week 7 Lecture Material–2.", "id": "W7Q5", "week": 7, "number": 5}, {"question": "What is Xbee in the context of Zigbee communication?", "options": [{"label": "a", "text": "A network protocol"}, {"label": "b", "text": "A product that uses the Zigbee protocol"}, {"label": "c", "text": "A routing algorithm"}, {"label": "d", "text": "A MAC-layer standard"}], "answer": "b", "explanation": "Xbee is a product that implements the Zigbee communication pro- tocol for radio communication. Refer to Slide 7 of Week 7 Lecture Material–2.", "id": "W7Q6", "week": 7, "number": 6}, {"question": "Which sensor in an autonomous vehicle generates data in the range of 20–40 MB/s?", "options": [{"label": "a", "text": "GPS"}, {"label": "b", "text": "RADAR"}, {"label": "c", "text": "Camera"}, {"label": "d", "text": "SONAR"}], "answer": "c", "explanation": "Camera sensors generate data in the range of 20–40 MB/s in au- tonomous vehicles. Refer to Slide 2 of Week 7 Lecture Material–3.", "id": "W7Q7", "week": 7, "number": 7}, {"question": "What type of computing processes data closer to sensors before sending it to the cloud?", "options": [{"label": "a", "text": "Edge computing"}, {"label": "b", "text": "Centralized computing"}, {"label": "c", "text": "Distributed computing"}, {"label": "d", "text": "Batch computing"}], "answer": "a", "explanation": "Edge computing performs data processing close to sensors before transmitting it to the cloud. Refer to Slide 6 of Week 7 Lecture Material–3.", "id": "W7Q8", "week": 7, "number": 8}, {"question": "In an end-to-end IIoT processing pipeline, where are rules initially con- figured?", "options": [{"label": "a", "text": "At the sensor nodes"}, {"label": "b", "text": "In the cloud"}, {"label": "c", "text": "At the edge analytics agent"}, {"label": "d", "text": "At the actuators"}], "answer": "b", "explanation": "Rules and actions are initially configured in the cloud before de- ployment to edge components. Refer to Slide 8 of Week 7 Lecture Material–3.", "id": "W7Q9", "week": 7, "number": 9}, {"question": "What is the main objective of AR drones-based precision agriculture?", "options": [{"label": "a", "text": "Monitoring soil moisture"}, {"label": "b", "text": "Precise fertilizer spray to weeds"}, {"label": "c", "text": "Autonomous harvesting"}, {"label": "d", "text": "Livestock monitoring"}], "answer": "b", "explanation": "AR drones-based precision agriculture focuses on precise fertilizer spraying targeted at weeds. Refer to Slide 7 of Week 7 Lecture Material–4.", "id": "W7Q10", "week": 7, "number": 10}, {"question": "SWAMP enables a smart management layer between which two systems?", "options": [{"label": "a", "text": "Water distribution network and farm-based irrigation system"}, {"label": "b", "text": "Cloud services and mobile applications"}, {"label": "c", "text": "Sensors and actuators"}, {"label": "d", "text": "Enterprise and automation networks"}], "answer": "a", "explanation": "SWAMP provides a smart management layer between water dis- tribution networks and farm-based irrigation systems. Refer to Slide 5 of Week 7 Lecture Material–4.", "id": "W7Q11", "week": 7, "number": 11}, {"question": "What do process variables represent in an industrial control system?", "options": [{"label": "a", "text": "Controller decision outputs"}, {"label": "b", "text": "Standard operating limits"}, {"label": "c", "text": "Values of process parameters measured using sensors"}, {"label": "d", "text": "Signals sent to actuators"}], "answer": "c", "explanation": "Process variables represent measured values of process parameters obtained using sensors. Refer to Slide 2 of Week 7 Lecture Material–5.", "id": "W7Q12", "week": 7, "number": 12}, {"question": "What is the fundamental element of industrial control systems for auto- matic control?", "options": [{"label": "a", "text": "Control loops"}, {"label": "b", "text": "Sensors"}, {"label": "c", "text": "Controllers"}, {"label": "d", "text": "Actuators"}], "answer": "a", "explanation": "Control loops form the fundamental element for automatic control of industrial processes. Refer to Slide 4 of Week 7 Lecture Material–5.", "id": "W7Q13", "week": 7, "number": 13}, {"question": "Which component of a SCADA system interfaces directly with sensors to read and convert data?", "options": [{"label": "a", "text": "The Supervisory System"}, {"label": "b", "text": "The Human Machine Interface (HMI)"}, {"label": "c", "text": "The Communication Infrastructure"}, {"label": "d", "text": "Programmable Logic Controllers (PLC) and Remote Terminal Units (RTU)"}], "answer": "d", "explanation": "PLCs and RTUs directly interface with sensors and convert analog or digital signals in SCADA systems. Refer to Page 235 of Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W7Q14", "week": 7, "number": 14}, {"question": "What is a primary advantage of PLCs over traditional hard-wired sys- tems?", "options": [{"label": "a", "text": "They are physically larger and more durable."}, {"label": "b", "text": "They can be easily reprogrammed, making maintenance and upgrades more economical."}, {"label": "c", "text": "They operate at a much higher voltage."}, {"label": "d", "text": "They do not require a power supply."}], "answer": "b", "explanation": "PLCs can be reprogrammed easily, enabling economical mainte- nance and system upgrades compared to hard-wired systems. Refer to Page 233 of Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W7Q15", "week": 7, "number": 15}, {"question": "What is the purpose of feature extraction in ML?", "options": [{"label": "a", "text": "Convert raw data into compressed bitstreams only"}, {"label": "b", "text": "Convert raw data to information that relates to the physical state of the asset"}, {"label": "c", "text": "Encrypt sensor data for security"}, {"label": "d", "text": "Remove time stamps from data"}], "answer": "b", "explanation": "Feature extraction converts raw data into information related to the physical state of the asset. Refer to Slide 8 of Week 8 Lecture Material 1.", "id": "W8Q1", "week": 8, "number": 1}, {"question": "What is a primary goal of applying analytics in industrial systems?", "options": [{"label": "a", "text": "Maximizing data volume"}, {"label": "b", "text": "Replacing all controllers with cloud services"}, {"label": "c", "text": "Improving operational platform, performance, and safety"}, {"label": "d", "text": "Eliminating human workers completely"}], "answer": "c", "explanation": "Industrial analytics aims to improve operational platforms, perfor- mance, and safety. Refer to Page 244 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W8Q2", "week": 8, "number": 2}, {"question": "What kind of data does supervised learning require?", "options": [{"label": "a", "text": "Completely unlabeled streams"}, {"label": "b", "text": "Only binary sensor signals"}, {"label": "c", "text": "Labeled datasets with known output classes or values"}, {"label": "d", "text": "Data without any prior samples"}], "answer": "c", "explanation": "Supervised learning requires labeled datasets with known outputs for training. Refer to Page 256 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W8Q3", "week": 8, "number": 3}, {"question": "Which of the following is explicitly listed as a goal of IIoT analytics?", "options": [{"label": "a", "text": "Manual inspection"}, {"label": "b", "text": "Dynamic operations optimization"}, {"label": "c", "text": "Hardware miniaturization"}, {"label": "d", "text": "Network routing"}], "answer": "b", "explanation": "Dynamic operations optimization is explicitly stated as a goal of IIoT analytics. Refer to Slide 4 of Week 8 Lecture Material 1.", "id": "W8Q4", "week": 8, "number": 4}, {"question": "What approach replaces physics-based models in modern IIoT analytics?", "options": [{"label": "a", "text": "Data-driven modelling using ML and DL"}, {"label": "b", "text": "Heuristic optimization"}, {"label": "c", "text": "Rule-based control"}, {"label": "d", "text": "Manual calibration"}], "answer": "a", "explanation": "Modern IIoT analytics replaces physics-based models with data- driven modelling using ML and DL. Refer to Slide 7 of Week 8 Lecture Material", "id": "W8Q5", "week": 8, "number": 5}, {"question": "Data Science is an interdisciplinary field involving which of the following areas?", "options": [{"label": "a", "text": "Only computer science"}, {"label": "b", "text": "Only data processing"}, {"label": "c", "text": "Only artificial intelligence"}, {"label": "d", "text": "Computer science, statistics, mathematics, machine learning, and domain ex- pertise"}], "answer": "d", "explanation": "Data Science integrates computer science, statistics, mathematics, machine learning, and domain expertise. Refer to Slide 4 of Week 8 Lecture Material 2.", "id": "W8Q6", "week": 8, "number": 6}, {"question": "Fill in the blank. Unsupervised learning is primarily used for identifying similar groups of data called .", "options": [{"label": "a", "text": "Clustering"}, {"label": "b", "text": "Classification"}, {"label": "c", "text": "Regression"}, {"label": "d", "text": "Prediction"}], "answer": "a", "explanation": "Unsupervised learning is mainly used for clustering similar data points. Refer to Slide 8 of Week 8 Lecture Material 2.", "id": "W8Q7", "week": 8, "number": 7}, {"question": "Which clustering algorithm allows a data point to belong to more than one cluster?", "options": [{"label": "a", "text": "K-Means"}, {"label": "b", "text": "Linear Regression"}, {"label": "c", "text": "Decision Tree"}, {"label": "d", "text": "Fuzzy c-Means"}], "answer": "d", "explanation": "Fuzzy c-Means allows data points to belong to multiple clusters. Refer to Slide 9 of Week 8 Lecture Material 2.", "id": "W8Q8", "week": 8, "number": 8}, {"question": "Fill in the blank. Machine learning algorithms are not useful for data.", "options": [{"label": "a", "text": "Structured"}, {"label": "b", "text": "Temporal"}, {"label": "c", "text": "High dimensional"}, {"label": "d", "text": "Labeled"}], "answer": "c", "explanation": "The limitations slide states that ML algorithms are not useful for high dimensional data. Refer to Slide 4 of Week 8 Lecture Material 3.", "id": "W8Q9", "week": 8, "number": 9}, {"question": "State True or False. Deep learning mimics the working function of bil- lions of neurons in the human brain.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "Deep learning is inspired by the functioning of billions of neurons in the human brain. Refer to Slide 6 of Week 8 Lecture Material 3.", "id": "W8Q10", "week": 8, "number": 10}, {"question": "Platform-as-a-Service mainly allows industries to do what?", "options": [{"label": "a", "text": "Only deploy hardware"}, {"label": "b", "text": "Self-develop applications"}, {"label": "c", "text": "Store raw sensor data only"}, {"label": "d", "text": "Replace networking infrastructure"}], "answer": "b", "explanation": "Platform-as-a-Service enables industries to self-develop applica- tions. Refer to Slide 9 of Week 8 Lecture Material 4.", "id": "W8Q11", "week": 8, "number": 11}, {"question": "Which type of data is explicitly mentioned as contributing to cloud de- mand in IIoT?", "options": [{"label": "a", "text": "Image data"}, {"label": "b", "text": "M2M sensor data"}, {"label": "c", "text": "Social media data"}, {"label": "d", "text": "Textual reports"}], "answer": "b", "explanation": "M2M sensor data is explicitly cited as contributing to cloud demand in IIoT. Refer to Slide 4 of Week 8 Lecture Material 4.", "id": "W8Q12", "week": 8, "number": 12}, {"question": "State True or False. Increase in number of devices makes IIoT ecosystems more complex, necessitating cloud-based device management.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "An increase in devices increases complexity, requiring cloud-based device management. Refer to Slide 9 of Week 8 Lecture Material 5.", "id": "W8Q13", "week": 8, "number": 13}, {"question": "What is one key purpose of a Service Level Agreement (SLA) for IIoT?", "options": [{"label": "a", "text": "Eliminating cloud providers"}, {"label": "b", "text": "Promising deliverables from cloud providers"}, {"label": "c", "text": "Increasing hardware redundancy"}, {"label": "d", "text": "Enforcing local computation"}], "answer": "b", "explanation": "An SLA defines and promises deliverables from cloud providers. Refer to Slide 12 of Week 8 Lecture Material 5.", "id": "W8Q14", "week": 8, "number": 14}, {"question": "Fill in the blank. A good SLA should be affordable, quantifiable, con- trollable, meaningful, mutually acceptable, and .", "options": [{"label": "a", "text": "Flexible"}, {"label": "b", "text": "Enforceable"}, {"label": "c", "text": "Achievable"}, {"label": "d", "text": "Adaptive"}], "answer": "c", "explanation": "Achievable is explicitly listed as a characteristic of a good SLA. Refer to Slide 13 of Week 8 Lecture Material 5.", "id": "W8Q15", "week": 8, "number": 15}, {"question": "Why is Julia programming considered advantageous?", "options": [{"label": "a", "text": "It is slower than Python."}, {"label": "b", "text": "It merges Python’s benefits with C’s performance."}, {"label": "c", "text": "It is a closed-source language."}, {"label": "d", "text": "It does not support parallelism."}], "answer": "b", "explanation": "Julia combines the ease of Python with the execution speed of C. Refer to Slide 18 of Week 9 Lecture Material 2.", "id": "W9Q1", "week": 9, "number": 1}, {"question": "What relationship does Linear Regression detect?", "options": [{"label": "a", "text": "A non-linear relationship between binary variables"}, {"label": "b", "text": "A clustering pattern in unlabeled data"}, {"label": "c", "text": "A random relationship between unrelated variables"}, {"label": "d", "text": "A linear relationship between a dependent variable and independent variables"}], "answer": "d", "explanation": "Linear regression detects a linear relationship between a dependent variable and independent variables. Refer to Page 257 of the book Introduction to Industrial Internet of Things and Industry 4.0 by S. Misra, C. Roy, and A. Mukherjee.", "id": "W9Q2", "week": 9, "number": 2}, {"question": "Which core concept defines Software-Defined Networking (SDN)?", "options": [{"label": "a", "text": "Hardwiring control logic into every switch"}, {"label": "b", "text": "Decoupling the control plane from the data plane"}, {"label": "c", "text": "Combining all network functions into a single monolithic server"}, {"label": "d", "text": "Eliminating the need for any software in networking"}], "answer": "b", "explanation": "SDN is defined by the decoupling of the control plane from the data plane. Refer to Slide 2 of Week 9 Lecture Material 5.", "id": "W9Q3", "week": 9, "number": 3}, {"question": "Fill in the blank. Fog computing architecture places fog nodes between and the cloud.", "options": [{"label": "a", "text": "Industrial end devices"}, {"label": "b", "text": "Enterprise servers"}, {"label": "c", "text": "Mobile applications"}, {"label": "d", "text": "Databases"}], "answer": "a", "explanation": "Fog nodes are placed between industrial end devices and the cloud. Refer to Slide 4 of Week 9 Lecture Material 1.", "id": "W9Q4", "week": 9, "number": 4}, {"question": "What is the major challenge in handling data from sensors and machines in IIoT?", "options": [{"label": "a", "text": "High cost of sensors"}, {"label": "b", "text": "Diversity in protocols, data syntax, and data sources"}, {"label": "c", "text": "Lack of storage capacity"}, {"label": "d", "text": "Insufficient processing power"}], "answer": "b", "explanation": "IIoT systems face challenges due to diversity in protocols, data syntax, and data sources. Refer to Slide 2 of Week 9 Lecture Material 1.", "id": "W9Q5", "week": 9, "number": 5}, {"question": "State True or False. Fog computing in IIoT prevents unnecessary noisy big data crowd at the cloud.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "Fog computing filters data at the edge to prevent noisy big data accumulation in the cloud. Refer to Slide 6 of Week 9 Lecture Material 1.", "id": "W9Q6", "week": 9, "number": 6}, {"question": "State True or False. R is an open source tool for programming, statistical analysis, and graphics representation.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "R is an open-source tool used for programming, statistical analysis, and graphical representation. Refer to Slide 3 of Week 9 Lecture Material 2.", "id": "W9Q7", "week": 9, "number": 7}, {"question": "Which R package provides functions for fuzzy clustering, support vector machine, and na ̈ıve bayes classifier?", "options": [{"label": "a", "text": "rpart"}, {"label": "b", "text": "e1071"}, {"label": "c", "text": "nnet"}, {"label": "d", "text": "caret"}], "answer": "b", "explanation": "The e1071 package supports fuzzy clustering, SVM, and na ̈ıve bayes classifiers. Refer to Slide 14 of Week 9 Lecture Material 2.", "id": "W9Q8", "week": 9, "number": 8}, {"question": "Fill in the blank. The basic service models provided by cloud computing include IaaS, PaaS, and .", "options": [{"label": "a", "text": "DaaS"}, {"label": "b", "text": "NaaS"}, {"label": "c", "text": "SaaS"}, {"label": "d", "text": "FaaS"}], "answer": "c", "explanation": "SaaS is one of the three basic cloud service models along with IaaS and PaaS. Refer to Slide 3 of Week 9 Lecture Material 3.", "id": "W9Q9", "week": 9, "number": 9}, {"question": "Which Hadoop component is described as a module containing the util- ities that support the other Hadoop components?", "options": [{"label": "a", "text": "HDFS"}, {"label": "b", "text": "MapReduce"}, {"label": "c", "text": "Hadoop Common"}, {"label": "d", "text": "YARN"}], "answer": "c", "explanation": "Hadoop Common contains utilities that support all other Hadoop components. Refer to Slide 17 of Week 9 Lecture Material 3.", "id": "W9Q10", "week": 9, "number": 10}, {"question": "What routing protocol does BCube run?", "options": [{"label": "a", "text": "BSR (Bcube Source Routing)"}, {"label": "b", "text": "BGP"}, {"label": "c", "text": "OSPF"}, {"label": "d", "text": "RIP"}], "answer": "a", "explanation": "BCube runs a source routing protocol known as BSR. Refer to Slide 11 of Week 9 Lecture Material 4.", "id": "W9Q11", "week": 9, "number": 11}, {"question": "Which of the following is mentioned as a data center network challenge?", "options": [{"label": "a", "text": "High cost"}, {"label": "b", "text": "Poor server-to-server Connectivity"}, {"label": "c", "text": "Complex configuration"}, {"label": "d", "text": "Limited vendors"}], "answer": "b", "explanation": "Poor server-to-server connectivity is listed as a data center network challenge. Refer to Slide 14 of Week 9 Lecture Material 4.", "id": "W9Q12", "week": 9, "number": 12}, {"question": "Which protocol is mentioned as part of SDN components?", "options": [{"label": "a", "text": "TCP"}, {"label": "b", "text": "UDP"}, {"label": "c", "text": "OpenFlow"}, {"label": "d", "text": "HTTP"}], "answer": "c", "explanation": "OpenFlow is explicitly mentioned as a protocol used in SDN. Refer to Slide 4 of Week 9 Lecture Material 5.", "id": "W9Q13", "week": 9, "number": 13}, {"question": "State True or False. GCAM is used to place flow-rules in SDN forwarding devices, but it is limited in capacity.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "b", "explanation": "TCAM, not GCAM, is used for flow-rule placement and is limited in capacity. Refer to Slide 6 of Week 9 Lecture Material 5.", "id": "W9Q14", "week": 9, "number": 14}, {"question": "Which advantage of SDIIoT enables events to be processed in order through deterministic forwarding of traffic?", "options": [{"label": "a", "text": "Deterministic networking"}, {"label": "b", "text": "High availability"}, {"label": "c", "text": "Low-latency virtualization"}, {"label": "d", "text": "Rob
