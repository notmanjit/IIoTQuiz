ust security"}], "answer": "a", "explanation": "Deterministic networking enables ordered event processing through rule-based forwarding. Refer to Slide 17 of Week 9 Lecture Material 5.", "id": "W9Q15", "week": 9, "number": 15}, {"question": "What is the primary objective of the IETF 6TiSCH protocol in the context of IIoT?", "options": [{"label": "a", "text": "To enable deterministic communication and efficient resource allocation"}, {"label": "b", "text": "To increase non-deterministic communication"}, {"label": "c", "text": "To replace SDN controllers entirely"}, {"label": "d", "text": "To increase jitter in the network"}], "answer": "a", "explanation": "6TiSCH enables deterministic communication and efficient resource allocation in constrained networks. Refer to Slide 7 of Week 10 Lecture Material 1.", "id": "W10Q1", "week": 10, "number": 1}, {"question": "μSDN is integrated with which protocol stack?", "options": [{"label": "a", "text": "Zigbee stack"}, {"label": "b", "text": "IPv4 stack"}, {"label": "c", "text": "Contiki IEEE 802.15.4-2015 stack"}, {"label": "d", "text": "LTE stack"}], "answer": "c", "explanation": "μSDN integrates with the Contiki IEEE 802.15.4-2015 protocol stack. Refer to Slide 10 of Week 10 Lecture Material 1.", "id": "W10Q2", "week": 10, "number": 2}, {"question": "Fill in the blank. The public network in SDIIoT consists of switches, routers, and network.", "options": [{"label": "a", "text": "Sensor"}, {"label": "b", "text": "Access"}, {"label": "c", "text": "Control"}, {"label": "d", "text": "Storage"}], "answer": "b", "explanation": "The public network includes switches, routers, and access network. Refer to Slide 4 of Week 10 Lecture Material 1.", "id": "W10Q3", "week": 10, "number": 3}, {"question": "State True or False. Trustworthy IIoT includes security, privacy, safety, reliability, and resilience.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "Trustworthy IIoT includes security, privacy, safety, reliability, and resilience. Refer to Slide 4 of Week 10 Lecture Material 2.", "id": "W10Q4", "week": 10, "number": 4}, {"question": "Fill in the blank. Current security architectures are mostly - centric.", "options": [{"label": "a", "text": "OT"}, {"label": "b", "text": "IT"}, {"label": "c", "text": "Cloud"}, {"label": "d", "text": "Device"}], "answer": "b", "explanation": "Current IIoT security architectures are mostly IT-centric. Refer to Slide 6 of Week 10 Lecture Material 2.", "id": "W10Q5", "week": 10, "number": 5}, {"question": "Which of the following is the first step in IIoT security risk management?", "options": [{"label": "a", "text": "Mitigating risks"}, {"label": "b", "text": "Accepting risks"}, {"label": "c", "text": "Avoiding risks"}, {"label": "d", "text": "Outsourcing risks"}], "answer": "c", "explanation": "Risk management begins with avoiding risks as the first step. Refer to Slide 8 of Week 10 Lecture Material 2.", "id": "W10Q6", "week": 10, "number": 6}, {"question": "Fill in the blank. Security of the whole IIoT system depends on deployed devices, communication security, data protection, and .", "options": [{"label": "a", "text": "Network topology"}, {"label": "b", "text": "Security management"}, {"label": "c", "text": "Sensor calibration"}, {"label": "d", "text": "Hardware redundancy"}], "answer": "b", "explanation": "Security management is essential for ensuring overall IIoT system security. Refer to Slide 2 of Week 10 Lecture Material 3.", "id": "W10Q7", "week": 10, "number": 7}, {"question": "Fill in the blank. End device protection requires physical security, access control, identity, and protection.", "options": [{"label": "a", "text": "Application"}, {"label": "b", "text": "Network"}, {"label": "c", "text": "Cloud"}, {"label": "d", "text": "Data"}], "answer": "d", "explanation": "End device protection includes data protection along with identity and access control. Refer to Slide 6 of Week 10 Lecture Material 3.", "id": "W10Q8", "week": 10, "number": 8}, {"question": "What is the primary security requirement of IIoT systems?", "options": [{"label": "a", "text": "Device scalability"}, {"label": "b", "text": "End-to-end security"}, {"label": "c", "text": "High bandwidth"}, {"label": "d", "text": "Low latency"}], "answer": "b", "explanation": "End-to-end security is the primary security requirement of IIoT systems. Refer to Slide 2 of Week 10 Lecture Material 3.", "id": "W10Q9", "week": 10, "number": 9}, {"question": "Which feature of a smart factory enables prediction of future outcomes?", "options": [{"label": "a", "text": "Transparent"}, {"label": "b", "text": "Connected"}, {"label": "c", "text": "Proactive"}, {"label": "d", "text": "Agile"}], "answer": "c", "explanation": "Proactive systems enable prediction of future outcomes for preven- tive actions. Refer to Slide 5 of Week 10 Lecture Material 4.", "id": "W10Q10", "week": 10, "number": 10}, {"question": "Airbus uses which technology to visualize production processes in real time?", "options": [{"label": "a", "text": "Augmented Reality"}, {"label": "b", "text": "Blockchain visualization"}, {"label": "c", "text": "Virtual reality only"}, {"label": "d", "text": "3D real-time visualization"}], "answer": "d", "explanation": "Airbus uses 3D real-time visualization to monitor production pro- cesses. Refer to Slide 7 of Week 10 Lecture Material 4.", "id": "W10Q11", "week": 10, "number": 11}, {"question": "What technology does Amazon use to automate product search and re- trieval in its warehouse?", "options": [{"label": "a", "text": "Automated conveyor belts"}, {"label": "b", "text": "Robotic shelves"}, {"label": "c", "text": "Augmented Reality devices"}, {"label": "d", "text": "Autonomous forklifts"}], "answer": "b", "explanation": "Amazon uses robotic shelves to automate product search and re- trieval. Refer to Slide 11 of Week 10 Lecture Material 4.", "id": "W10Q12", "week": 10, "number": 12}, {"question": "What is the role of the sensing layer in IoT-enabled food supply chains?", "options": [{"label": "a", "text": "Data encryption"}, {"label": "b", "text": "Monitoring food quality using sensors"}, {"label": "c", "text": "Providing cloud analytics"}, {"label": "d", "text": "Managing business operations"}], "answer": "b", "explanation": "The sensing layer monitors food quality using networked sensors. Refer to Slide 2 of Week 10 Lecture Material 5.", "id": "W10Q13", "week": 10, "number": 13}, {"question": "What is one major benefit of supply chain transparency in the food industry?", "options": [{"label": "a", "text": "Increased manual intervention"}, {"label": "b", "text": "Reduced food wastage"}, {"label": "c", "text": "Reduced sensor usage"}, {"label": "d", "text": "Elimination of automation"}], "answer": "b", "explanation": "Supply chain transparency helps reduce food wastage through real- time monitoring. Refer to Slide 5 of Week 10 Lecture Material 5.", "id": "W10Q14", "week": 10, "number": 14}, {"question": "What does the ”Flavor Matrix” by Culinary Science Industries use to enhance dishes?", "options": [{"label": "a", "text": "Robot chefs"}, {"label": "b", "text": "Augmented Reality menus"}, {"label": "c", "text": "3D printed food"}, {"label": "d", "text": "Machine learning and data analysis of food ingredients"}], "answer": "d", "explanation": "Flavor Matrix uses machine learning and data analysis to enhance food flavor combinations. Refer to Slide 19 of Week 10 Lecture Material 5.", "id": "W10Q15", "week": 10, "number": 15}, {"question": "In the context of the IIoT Healthcare Architecture, which process im- mediately follows ”Sensing”?", "options": [{"label": "a", "text": "Learning"}, {"label": "b", "text": "Storing"}, {"label": "c", "text": "Sending"}, {"label": "d", "text": "Processing"}], "answer": "c", "explanation": "The IIoT Healthcare Architecture flow is Sensing → Sending → Processing → Storing → Learning. Refer to Slide 7 of Week 11 Lecture Material 1.", "id": "W11Q1", "week": 11, "number": 1}, {"question": "State True or False: Asthma is a lifelong disease that can be completely cured using IIoT-based smart inhalers.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "b", "explanation": "Asthma is a lifelong disease that can be controlled but not cured. Refer to Slide 15 of Week 11 Lecture Material 1.", "id": "W11Q2", "week": 11, "number": 2}, {"question": "Which of the following is given as an example of a wireless ECG moni- toring device?", "options": [{"label": "a", "text": "iHealth BP5"}, {"label": "b", "text": "Dexcom"}, {"label": "c", "text": "QardioCore"}, {"label": "d", "text": "Kinsa smart thermometer"}], "answer": "c", "explanation": "QardioCore is presented as a wireless ECG monitoring device. Refer to Slide 9 of Week 11 Lecture Material 1.", "id": "W11Q3", "week": 11, "number": 3}, {"question": "State True or False: In Advanced Metering Infrastructure (AMI), Broad- band over PowerLine and Fixed radio frequency are used for communi- cation networks.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "AMI communication networks use Broadband over PowerLine and Fixed radio frequency. Refer to Slide 13 of Week 11 Lecture Material 2.", "id": "W11Q4", "week": 11, "number": 4}, {"question": "Which specific issue can IoT predict in the water sector besides tracking water pressure and water quality?", "options": [{"label": "a", "text": "Water freezing points"}, {"label": "b", "text": "Exact rainwater volume"}, {"label": "c", "text": "Water leakage"}, {"label": "d", "text": "New underground water sources"}], "answer": "c", "explanation": "IoT systems can predict water leakage along with monitoring pres- sure and quality. Refer to Slide 15 of Week 11 Lecture Material 2.", "id": "W11Q5", "week": 11, "number": 5}, {"question": "How does a digital power plant reduce costs?", "options": [{"label": "a", "text": "By increasing manpower"}, {"label": "b", "text": "By increasing fuel consumption"}, {"label": "c", "text": "By using manual monitoring"}, {"label": "d", "text": "By utilizing automated devices reducing the need for manpower and mainte- nance"}], "answer": "d", "explanation": "Digital power plants reduce costs through automation that lowers manpower and maintenance needs. Refer to Slide 4 of Week 11 Lecture Material 2.", "id": "W11Q6", "week": 11, "number": 6}, {"question": "Which type of RFID tag relies on backscattering and has no internal power source?", "options": [{"label": "a", "text": "Active RFID"}, {"label": "b", "text": "Passive RFID"}, {"label": "c", "text": "Battery-Assisted Passive RFID"}, {"label": "d", "text": "Hybrid RFID"}], "answer": "b", "explanation": "Passive RFID tags rely on backscattering and do not contain an internal power source. Refer to Slide 10 of Week 11 Lecture Material 3.", "id": "W11Q7", "week": 11, "number": 7}, {"question": "Which of the following is considered a primary Function of Inventory Management?", "options": [{"label": "a", "text": "Increasing data scattering"}, {"label": "b", "text": "Decoupling components of the production-distribution system"}, {"label": "c", "text": "Broadcasting information signals"}, {"label": "d", "text": "Creating additional noise"}], "answer": "b", "explanation": "Inventory management decouples components of the production- distribution system. Refer to Slide 5 of Week 11 Lecture Material 3.", "id": "W11Q8", "week": 11, "number": 8}, {"question": "Fill in the blank. Quality Control is defined as a system of routine technical activities to measure and control the quality of the inventory as it is being .", "options": [{"label": "a", "text": "Developed"}, {"label": "b", "text": "Transported to retail"}, {"label": "c", "text": "Sold to the customer"}, {"label": "d", "text": "Disposed of"}], "answer": "a", "explanation": "Quality control measures and controls the quality of inventory as it is being developed. Refer to Slide 7 of Week 11 Lecture Material 3.", "id": "W11Q9", "week": 11, "number": 9}, {"question": "Fill in the blank. The Intrusion Triangle consists of Opportunity, Means, and .", "options": [{"label": "a", "text": "Integrity"}, {"label": "b", "text": "Motive"}, {"label": "c", "text": "Availability"}, {"label": "d", "text": "Authentication"}], "answer": "b", "explanation": "The Intrusion Triangle includes Motive, Opportunity, and Means. Refer to Slide 2 of Week 11 Lecture Material 4.", "id": "W11Q10", "week": 11, "number": 10}, {"question": "Which Software Security concept is responsible for the verification of credentials entered locally or remotely?", "options": [{"label": "a", "text": "Integrity"}, {"label": "b", "text": "Authentication"}, {"label": "c", "text": "Availability"}, {"label": "d", "text": "Network segmentation"}], "answer": "b", "explanation": "Authentication verifies credentials entered locally or remotely. Refer to Slide 8 of Week 11 Lecture Material 4. 3", "id": "W11Q11", "week": 11, "number": 11}, {"question": "Which type of Network Security specifically scans for malware detection and prevention?", "options": [{"label": "a", "text": "Access control"}, {"label": "b", "text": "Application security"}, {"label": "c", "text": "Behavioral analytics"}, {"label": "d", "text": "Antivirus/antimalware software"}], "answer": "d", "explanation": "Antivirus and antimalware software scans systems to detect and prevent malware. Refer to Slide 12 of Week 11 Lecture Material 4.", "id": "W11Q12", "week": 11, "number": 12}, {"question": "According to the Facilities Management Good Practice Guide, what does Facility Management manage on behalf of property owners?", "options": [{"label": "a", "text": "Factory assembly lines"}, {"label": "b", "text": "Buildings, precincts, community infrastructure"}, {"label": "c", "text": "Cloud computing servers"}, {"label": "d", "text": "Retail supply chains"}], "answer": "b", "explanation": "Facility Management manages buildings, precincts, and community infrastructure. Refer to Slide 2 of Week 11 Lecture Material 5.", "id": "W11Q13", "week": 11, "number": 13}, {"question": "State True or False: In the scope of IoT in Facility Management, imple- menting new technology includes Light Fidelity (Li-Fi) and data security.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "Implementing new technologies such as Li-Fi and data security is included in IoT-based facility management. Refer to Slide 6 of Week 11 Lecture Material 5.", "id": "W11Q14", "week": 11, "number": 14}, {"question": "Which support service focuses on researching potential customers?", "options": [{"label": "a", "text": "Administrative Support"}, {"label": "b", "text": "Marketing"}, {"label": "c", "text": "Business Development"}, {"label": "d", "text": "Information Technology"}], "answer": "b", "explanation": "Marketing focuses on researching potential customers. Refer to Slide 8 of Week 11 Lecture Material 5.", "id": "W11Q15", "week": 11, "number": 15}, {"question": "In the Oil and Gas Industry Work-flow, which step immediately precedes the data moving to a cloud-based analytics platform?", "options": [{"label": "a", "text": "Deploy IoT solutions"}, {"label": "b", "text": "Apply predictive analytics"}, {"label": "c", "text": "Data analysis by extraction, transform and load"}, {"label": "d", "text": "Identify required maintenance"}], "answer": "c", "explanation": "Data analysis using ETL occurs just before data is moved to the cloud platform. Refer to Slide 5 of Week 12 Lecture Material 1.", "id": "W12Q1", "week": 12, "number": 1}, {"question": "State True or False: In the Machine Learning and Cloud Services work- flow, identifying specific data types occurs after analyzing and evaluating data.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "a", "explanation": "Identification of specific data types follows analysis and evaluation of data. Refer to Slide 6 of Week 12 Lecture Material 1.", "id": "W12Q2", "week": 12, "number": 2}, {"question": "In the Chemical Industry, what is a primary goal of Predictive Mainte- nance?", "options": [{"label": "a", "text": "Address real time issues"}, {"label": "b", "text": "Track vehicle locations"}, {"label": "c", "text": "Increase energy usage"}, {"label": "d", "text": "Optimize medicine routing"}], "answer": "a", "explanation": "Predictive maintenance focuses on addressing real-time issues and reducing breakdowns. Refer to Slide 12 of Week 12 Lecture Material 1.", "id": "W12Q3", "week": 12, "number": 3}, {"question": "Which of the following actions is part of ”Improve Logistics” in the Chemical Industry?", "options": [{"label": "a", "text": "Analyzing water and nutrients"}, {"label": "b", "text": "Detection of contamination or attacks"}, {"label": "c", "text": "Pricing model with profit margin"}, {"label": "d", "text": "Reducing equipment breakdown"}], "answer": "b", "explanation": "Improve logistics includes detection of contamination or attacks. Refer to Slide 14 of Week 12 Lecture Material 1.", "id": "W12Q4", "week": 12, "number": 4}, {"question": "Fill in the blank. IoT applications in the Pharmaceutical Industry are de- ployed to connect different technologies including manufacturing, moni- toring, controlling, and .", "options": [{"label": "a", "text": "Distribution"}, {"label": "b", "text": "Farming"}, {"label": "c", "text": "Extraction"}, {"label": "d", "text": "Refining"}], "answer": "a", "explanation": "Pharmaceutical IoT systems integrate manufacturing, monitoring, controlling, and distribution. Refer to Slide 20 of Week 12 Lecture Material 1.", "id": "W12Q5", "week": 12, "number": 5}, {"question": "How do UAVs typically communicate with industrial systems?", "options": [{"label": "a", "text": "Through handwritten notes"}, {"label": "b", "text": "Through SCADA systems"}, {"label": "c", "text": "Via wired connections only"}, {"label": "d", "text": "T ibrillators"}, {"label": "c", "text": "Thermal imagery"}, {"label": "d", "text": "360° gimbals"}], "answer": "a", "explanation": "Drones with manipulator arms are being researched to assist the elderly. Refer to Slide 12 of Week 12 Lecture Material 2.", "id": "W12Q10", "week": 12, "number": 10}, {"question": "How do UAVs specifically assist in testing networks within the Telecom- munication sector?", "options": [{"label": "a", "text": "By broadcasting live events"}, {"label": "b", "text": "By providing internet services to urban areas"}, {"label": "c", "text": "By monitoring construction sites"}, {"label": "d", "text": "By testing network coverage and stability"}], "answer": "d", "explanation": "UAVs are used to test network coverage and stability in telecom systems. Refer to Slide 13 of Week 12 Lecture Material 2.", "id": "W12Q11", "week": 12, "number": 11}, {"question": "Fill in the blank. A case study enables a researcher to closely examine the data within a .", "options": [{"label": "a", "text": "Broad universal scope"}, {"label": "b", "text": "Specific context"}, {"label": "c", "text": "Simulated testing environment"}, {"label": "d", "text": "Purely hypothetical scenario"}], "answer": "b", "explanation": "Case studies analyze data within a specific real-world context. Refer to Slide 2 of Week 12 Lecture Material 3.", "id": "W12Q12", "week": 12, "number": 12}, {"question": "State True or False: Case studies are limited to providing only qualitative analysis of the data.", "options": [{"label": "a", "text": "True"}, {"label": "b", "text": "False"}], "answer": "b", "explanation": "Case studies provide both qualitative and quantitative analysis. Refer to Slide 2 of Week 12 Lecture Material 3.", "id": "W12Q13", "week": 12, "number": 13}, {"question": "Fill in the blank. A key point to ponder for all case studies is the reduction of of workers.", "options": [{"label": "a", "text": "Mandatory work hours"}, {"label": "b", "text": "Annual paid leaves"}, {"label": "c", "text": "Technical training costs"}, {"label": "d", "text": "Health hazards"}], "answer": "d", "explanation": "Reducing health hazards of workers is a key consideration in case studies. Refer to Slide 6 of Week 12 Lecture Material 3.", "id": "W12Q14", "week": 12, "number": 14}, {"question": "What do case studies explore and investigate through detailed analysis?", "options": [{"label": "a", "text": "Real-life phenomenon"}, {"label": "b", "text": "Purely fictional events"}, {"label": "c", "text": "Ancient historical myths"}, {"label": "d", "text": "Unknown future predictions"}], "answer": "a", "explanation": "Case studies investigate real-life phenomena through detailed anal- ysis. Refer to Slide 3 of Week 12 Lecture Material 3.", "id": "W12Q15", "week": 12, "number": 15}];

  // ---------- HELPERS ----------
  function shuffleArray(arr) {
    const copy = arr.slice();
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function buildAttempt() {
    return shuffleArray(BANK).map((q, idx) => {
      const shuffledOpts = shuffleArray(q.options.map(o => ({ ...o })));
      return { ...q, attemptIndex: idx, shuffledOptions: shuffledOpts };
    });
  }

  // ---------- PERSISTENT STATE ----------
  const STORAGE_KEY = "mcq_persistent_quiz";

  let attempt = [];          // full shuffled questions with shuffled options
  let currentIndex = 0;
  let userAnswers = {};      // key: question.id, value: selected option label (a/b/c/d)
  let finished = false;

  function computeScore() {
    let score = 0;
    for (let q of attempt) {
      const ans = userAnswers[q.id];
      if (ans && ans === q.answer) score++;
    }
    return score;
  }

  function saveToLocalStorage() {
    const toStore = {
      attempt,
      currentIndex,
      userAnswers,
      finished
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toStore));
  }

  function loadFromLocalStorage() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    try {
      const saved = JSON.parse(raw);
      if (saved.attempt && Array.isArray(saved.attempt) && saved.attempt.length === BANK.length) {
        return saved;
      }
    } catch(e) {}
    return null;
  }

  function resetQuizAndClear() {
    localStorage.removeItem(STORAGE_KEY);
    initFreshState();
    render();
  }

  function initFreshState() {
    attempt = buildAttempt();
    currentIndex = 0;
    userAnswers = {};
    finished = false;
    saveToLocalStorage();
  }

  function initializeState() {
    const saved = loadFromLocalStorage();
    if (saved) {
      attempt = saved.attempt;
      currentIndex = saved.currentIndex;
      userAnswers = saved.userAnswers;
      finished = saved.finished;
      // ensure attempt length matches bank length (safety)
      if (attempt.length !== BANK.length) {
        initFreshState();
      }
    } else {
      initFreshState();
    }
  }

  // UI helpers
  const app = document.getElementById('app');

  function getCurrentQuestion() {
    return attempt[currentIndex];
  }

  function isCurrentAnswered() {
    const q = getCurrentQuestion();
    return q && !!userAnswers[q.id];
  }

  function getSelectedForCurrent() {
    const q = getCurrentQuestion();
    return q ? (userAnswers[q.id] || null) : null;
  }

  function optionClass(opt, selectedLabel, isAnswered, correctAnswer) {
    if (!isAnswered) return "option";
    if (opt.label === correctAnswer) return "option correct";
    if (selectedLabel === opt.label && opt.label !== correctAnswer) return "option wrong";
    return "option";
  }

  function optionMark(opt, selectedLabel, isAnswered, correctAnswer) {
    if (!isAnswered) return opt.label.toUpperCase();
    if (opt.label === correctAnswer) return "✓";
    if (selectedLabel === opt.label && opt.label !== correctAnswer) return "✕";
    return opt.label.toUpperCase();
  }

  function escapeHtml(str) {
    return String(str).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
  }

  function chooseAnswer(selectedLabel) {
    const q = getCurrentQuestion();
    if (!q || isCurrentAnswered()) return;
    userAnswers[q.id] = selectedLabel;
    saveToLocalStorage();
    render();
  }

  function nextQuestion() {
    if (finished) return;
    if (!isCurrentAnswered()) return; // must answer
    if (currentIndex + 1 >= attempt.length) {
      finished = true;
      saveToLocalStorage();
      render();
    } else {
      currentIndex++;
      saveToLocalStorage();
      render();
    }
  }

  function render() {
    const total = attempt.length;
    if (finished) {
      const score = computeScore();
      const pct = Math.round((score / total) * 100);
      app.innerHTML = `
        <section class="topbar">
          <div class="brand">
            <div>
              <h1 class="title">MCQ Quiz</h1>
              <p class="subtitle">Persistent quiz · Your progress is saved.</p>
            </div>
            <div class="pill-row">
              <span class="pill">Final score: ${score}/${total}</span>
              <span class="pill">Accuracy: ${pct}%</span>
              <span class="pill reset-pill" id="globalResetBtn">⟳ Reset Quiz</span>
            </div>
          </div>
        </section>
        <section class="result-shell">
          <p class="result-score">${score} / ${total}</p>
          <p class="result-sub">You completed the quiz. Press "Reset Quiz" for a fresh shuffled attempt.</p>
          <div class="actions" style="justify-content:center;">
            <button class="btn btn-primary" id="resetFromResult">⟳ New shuffled attempt</button>
          </div>
        </section>
        <div class="footer-note">All 180 questions. localStorage keeps your answers and question order across refresh.</div>
      `;
      document.getElementById('globalResetBtn')?.addEventListener('click', () => resetQuizAndClear());
      document.getElementById('resetFromResult')?.addEventListener('click', () => resetQuizAndClear());
      return;
    }

    const q = getCurrentQuestion();
    const answered = isCurrentAnswered();
    const selected = getSelectedForCurrent();
    const correctOption = q.shuffledOptions.find(o => o.label === q.answer);
    const isCorrect = (selected !== null && selected === q.answer);
    const progress = ((currentIndex) / total) * 100;
    const currentScore = computeScore();

    app.innerHTML = `
      <section class="topbar">
        <div class="brand">
          <div>
            <h1 class="title">MCQ Quiz</h1>
            <p class="subtitle">Persistent progress — answers saved automatically.</p>
          </div>
          <div class="pill-row">
            <span class="pill">Question ${currentIndex+1} / ${total}</span>
            <span class="pill">Score: ${currentScore}</span>
            <span class="pill reset-pill" id="globalResetBtnTop">⟳ Reset Quiz</span>
          </div>
        </div>
        <div class="progress-shell"><div class="progress-bar" style="width: ${progress}%;"></div></div>
      </section>
      <section class="content">
        <div class="question-card">
          <div class="q-meta"><span class="q-tag">Shuffled attempt</span><span class="q-number">Question ${currentIndex+1} of ${total}</span></div>
          <h2 class="question">${escapeHtml(q.question)}</h2>
          <div class="options">
            ${q.shuffledOptions.map(opt => `
              <button class="${optionClass(opt, selected, answered, q.answer)}" data-label="${opt.label}" ${answered ? 'disabled' : ''} aria-pressed="${selected === opt.label ? 'true' : 'false'}">
                <span class="badge">${optionMark(opt, selected, answered, q.answer)}</span>
                <span class="opt-text">${escapeHtml(opt.text)}</span>
              </button>
            `).join('')}
          </div>
          ${answered ? `
            <div class="feedback ${isCorrect ? 'good' : 'bad'}">
              <p class="feedback-title">${isCorrect ? '✓ Correct' : '✗ Incorrect'}</p>
              <p>${isCorrect ? 'Great! Your answer matches.' : 'The correct answer is ' + correctOption.label.toUpperCase() + '. ' + escapeHtml(correctOption.text)}</p>
              <p style="margin-top:8px;">${escapeHtml(q.explanation)}</p>
            </div>
          ` : ''}
          <div class="actions" style="margin-top:18px;">
            <button class="btn btn-secondary" id="resetInlineBtn">⟳ Reset quiz</button>
            <button class="btn btn-primary" id="nextBtnQuiz" ${answered ? '' : 'disabled'}>${currentIndex+1 === total ? 'Finish quiz' : 'Next question'}</button>
          </div>
        </div>
      </section>
      <div class="footer-note">Answers persist after refresh. Use Reset Quiz to clear all progress and reshuffle.</div>
    `;

    document.querySelectorAll('.option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const label = btn.dataset.label;
        if (!answered && label) chooseAnswer(label);
      });
    });
    document.getElementById('nextBtnQuiz')?.addEventListener('click', nextQuestion);
    document.getElementById('resetInlineBtn')?.addEventListener('click', () => resetQuizAndClear());
    document.getElementById('globalResetBtnTop')?.addEventListener('click', () => resetQuizAndClear());
  }

  // start app
  initializeState();
  render();
</script>
</body>
</html>
